<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настоящий Сетевой Чат</title>
    <style>
        body { font-family: sans-serif; background: #0e1621; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #182533; padding: 30px; border-radius: 8px; width: 320px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #24303f; color: white; border: 1px solid #17212b; border-radius: 4px; text-align: center; font-size: 16px; outline: none; }
        button { padding: 10px 15px; background: #2481cc; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; width: 97%; }
        
        #messenger { display: none; width: 100%; max-width: 600px; height: 80vh; background: #182533; padding: 20px; border-radius: 8px; box-sizing: border-box; }
        #chat { width: 100%; height: 75%; border: 1px solid #17212b; background: #0e1621; overflow-y: auto; padding: 10px; margin-bottom: 10px; box-sizing: border-box; border-radius: 4px; }
        .msg-line { margin-bottom: 8px; text-align: left; font-size: 15px; }
        .user-name { font-weight: bold; color: #2481cc; margin-right: 5px; }
        #msg-input { width: 100%; min-height: 50px; background: #24303f; color: white; border: 1px solid #17212b; border-radius: 4px; padding: 10px; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>

    <!-- ВХОД -->
    <div class="login-box" id="auth-gate">
        <h2>Вход</h2>
        <input type="password" id="password-input" value="12345">
        <input type="text" id="username-input" value="Юзер_ПК">
        <button onclick="checkPassword()">Войти</button>
    </div>

    <!-- МЕССЕНДЖЕР -->
    <div id="messenger">
        <h3 id="status-title" style="margin-top: 0; color: #ffff55;">Подключение к сети...</h3>
        <div id="chat"></div>
        <div id="msg-input" contenteditable="true" placeholder="Напишите сообщение..."></div>
        <button onclick="send()" style="width: 100%; margin-top: 10px;">Отправить</button>
    </div>

    <script>
        var myName = "Пользователь";
        var socket;
        
        // Уникальное имя канала. Измените цифры, чтобы создать свою закрытую комнату.
        var CHANNEL_NAME = "##github_p2p_room_2026_v5"; 

        function checkPassword() {
            if (document.getElementById('password-input').value === "12345") { 
                // Превращаем никнейм в английские буквы, так как IRC сервера требуют латиницу в ID
                var rawUser = document.getElementById('username-input').value.trim() || "User";
                myName = rawUser.replace(/[^a-zA-Z0-9_]/g, '') + "_" + Math.floor(Math.random() * 100);
                
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('messenger').style.display = 'block';
                
                initIRCNetwork();
            }
        }

        function initIRCNetwork() {
            // Подключаемся к крупнейшей мировой текстовой сети через бесплатный защищенный веб-сокет шлюз
            socket = new WebSocket('wss://irc.libera.chat:8443');

            socket.onopen = function() {
                // Регистрируемся на IRC сервере по официальному стандарту
                socket.send("NICK " + myName + "\r\n");
                socket.send("USER " + myName + " 0 * :P2PChat\r\n");
                // Заходим в нашу секретную комнату
                socket.send("JOIN " + CHANNEL_NAME + "\r\n");
                
                var status = document.getElementById('status-title');
                status.innerText = "Сеть активна | Ник в сети: " + myName;
                status.style.color = "#55ff55";
            };

            socket.onmessage = function(event) {
                var rawLine = event.data;
                
                // Сервер периодически проверяет, живы ли мы. Отвечаем автоматом, чтобы не выкинуло
                if (rawLine.indexOf("PING") === 0) {
                    socket.send(rawLine.replace("PING", "PONG") + "\r\n");
                    return;
                }
                
                // Вырезаем текст сообщения из сетевой строки IRC вида ":Ник!~user@host PRIVMSG ##канал :текст"
                var privmsgIndex = rawLine.indexOf(" PRIVMSG " + CHANNEL_NAME + " :");
                if (privmsgIndex !== -1) {
                    var sender = rawLine.substring(1, rawLine.indexOf("!"));
                    var text = rawLine.substring(privmsgIndex + (" PRIVMSG " + CHANNEL_NAME + " :").length).trim();
                    
                    // Если сообщение от твинка — выводим на экран
                    if (sender !== myName) {
                        displayMessage(sender, text);
                    }
                }
            };

            socket.onclose = function() {
                document.getElementById('status-title').innerText = "Переподключение...";
                document.getElementById('status-title').style.color = "#ff5555";
                setTimeout(initIRCNetwork, 4000); // Автоподключение при сбое мобильного интернета
            };
        }

        function displayMessage(senderName, messageText) {
            var chat = document.getElementById('chat');
            chat.innerHTML += '<div class="msg-line"><span class="user-name">' + senderName + ':</span><span>' + messageText + '</span></div>';
            chat.scrollTop = chat.scrollHeight;
        }

        function send() {
            var input = document.getElementById('msg-input');
            var text = input.innerText.trim();
            
            if (text.length > 0) {
                // 1. Сразу выводим сообщение у себя на экране
                displayMessage(myName, text);
                
                // 2. Отправляем в глобальный канал для твинка по стандарту PRIVMSG
                if (socket && socket.readyState === WebSocket.OPEN) {
                    socket.send("PRIVMSG " + CHANNEL_NAME + " :" + text + "\r\n");
                }
                
                input.innerHTML = '';
            }
        }
    </script>
</body>
</html>
