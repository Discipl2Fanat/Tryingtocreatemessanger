<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аналог ТГ — Rich Text v1.1</title>
    <style>
        body { font-family: sans-serif; background: #0e1621; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #182533; padding: 30px; border-radius: 8px; width: 320px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        input, select { width: 90%; padding: 10px; margin: 10px 0; background: #24303f; color: white; border: 1px solid #17212b; border-radius: 4px; text-align: center; font-size: 16px; }
        button { padding: 10px 15px; background: #2481cc; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #288ece; }
        #error-msg { color: #e53935; font-size: 14px; margin-top: 10px; display: none; }
        
        /* Стили мессенджера */
        #messenger { display: none; width: 100%; max-width: 600px; height: 80vh; background: #182533; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #chat { width: 100%; height: 60%; border: 1px solid #17212b; background: #0e1621; overflow-y: auto; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .msg-line { margin-bottom: 8px; word-wrap: break-word; }
        .user-name { font-weight: bold; margin-right: 5px; }
        
        /* Панель форматирования */
        .toolbar { display: flex; gap: 5px; margin-bottom: 5px; }
        .toolbar button, .toolbar select { padding: 5px; font-size: 13px; width: auto; margin: 0; }
        
        /* Поле ввода текста (Rich Text) */
        #msg-input { width: 100%; min-height: 50px; max-height: 100px; background: #24303f; color: white; border: 1px solid #17212b; border-radius: 4px; padding: 10px; overflow-y: auto; box-sizing: border-box; text-align: left; }
    </style>
</head>
<body>

    <!-- ОКНО ВВОДА-->
    <div class="login-box" id="auth-gate">
        <h2>Это окно ввода пароля</h2>
        <p style="color: #708499; font-size: 14px;">Введите код-пароль</p>
        <input type="text" id="riddle-answer" placeholder="Ответ...">
        <input type="text" id="username-input" placeholder="Ваше имя/никнейм" value="НИКНЕЙМ">
        <button onclick="checkRiddle()">Войти в сеть</button>
        <div id="error-msg">Ответ неверный. Доступ заблокирован.</div>
    </div>

    <!-- ОКНО МЕССЕНДЖЕРА -->
    <div id="messenger">
        <h3 style="margin-top: 0;">Наш аналог телеграмма (Rich Text)</h3>
        <div id="chat"></div>
        
        <!-- Панель инструментов для стилей текста -->
        <div class="toolbar">
            <button onclick="format('bold')"><b>B</b></button>
            <button onclick="format('italic')"><i>I</i></button>
            <button onclick="format('underline')"><u>U</u></button>
            <select onchange="format('foreColor', this.value)">
                <option value="#ffffff">Белый</option>
                <option value="#ff5555">Красный</option>
                <option value="#55ff55">Зеленый</option>
                <option value="#5555ff">Синий</option>
                <option value="#ffff55">Желтый</option>
            </select>
        </div>

        <!-- Редактируемый блок вместо обычного input -->
        <div id="msg-input" contenteditable="true" placeholder="Напишите сообщение..."></div>
        <button onclick="send()" style="width: 100%; margin-top: 10px;">Отправить</button>
    </div>

    <script>
        let ws;
        let myName = "Никнейм";

        function checkRiddle() {
            const userAnswer = document.getElementById('riddle-answer').value.trim().toLowerCase();
            const errorBlock = document.getElementById('error-msg');
            myName = document.getElementById('username-input').value.trim() || "Товарищ";
            
            if (userAnswer === "стекловата") {
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('messenger').style.display = 'block';
                initWebSocket(); // Запускаем сеть после отгадки
            } else {
                errorBlock.style.display = 'block';
                document.getElementById('riddle-answer').value = '';
            }
        }

        // Функции форматирования Rich Text
        function format(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('msg-input').focus();
        }

        function initWebSocket() {
            // Замените на ваш реальный адрес Ngrok/сервера
            ws = new WebSocket('wss://ВАШ_АДРЕС_ИЗ_NGROK'); 

            ws.onmessage = function(event) {
                const chat = document.getElementById('chat');
                chat.innerHTML += `<div class="msg-line">${event.data}</div>`;
                chat.scrollTop = chat.scrollHeight;
            };
        }

        function send() {
            const input = document.getElementById('msg-input');
            const htmlContent = input.innerHTML.trim();
            
            if (htmlContent && ws && ws.readyState === WebSocket.OPEN) {
                // Упаковываем имя и форматированный текст в одно сообщение
                const fullMessage = `<span class="user-name" style="color: #2481cc;">${myName}:</span> <span>${htmlContent}</span>`;
                
                // Отображаем у себя
                const chat = document.getElementById('chat');
                chat.innerHTML += `<div class="msg-line">${fullMessage}</div>`;
                chat.scrollTop = chat.scrollHeight;

                // Отправляем в сеть другим пользователям
                ws.send(fullMessage);
                input.innerHTML = ''; // Очищаем поле
            }
        }
    </script>
</body>
</html>
